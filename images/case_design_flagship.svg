<svg width="400mm" height="300mm" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<!--LODESTAR FACEPLATE: BOAT CLEAT READY-->
  <g id="Lodestar_Faceplate_Cleat_Ready">
    <rect x="10" y="10" width="180" height="150" rx="15" ry="15" fill="none" stroke="blue" stroke-width="0.5"/>
<!--1/4" Alignment Holes-->
    <circle cx="20" cy="20" r="3.175" fill="none" stroke="magenta" stroke-width="0.5"/>
    <circle cx="180" cy="20" r="3.175" fill="none" stroke="magenta" stroke-width="0.5"/>
    <circle cx="20" cy="150" r="3.175" fill="none" stroke="magenta" stroke-width="0.5"/>
    <circle cx="180" cy="150" r="3.175" fill="none" stroke="magenta" stroke-width="0.5"/>
<!--Main Dashboard Branding-->
    <text x="100" y="35" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="green">AVRRC LODESTAR</text>
    <text x="100" y="48" font-family="Arial" font-size="5" text-anchor="middle" fill="green">Fleet Command | By KOTORI</text>
<!--OLED Viewport (Center)-->
    <rect x="87" y="60" width="26" height="15" rx="1" ry="1" fill="none" stroke="red" stroke-width="0.5"/>
<!--Joysticks (28mm)-->
    <circle cx="45" cy="95" r="14" fill="none" stroke="red" stroke-width="0.5"/>
    <circle cx="155" cy="95" r="14" fill="none" stroke="red" stroke-width="0.5"/>
<!--Function Buttons (A & B)-->
    <circle cx="85" cy="85" r="3.25" fill="none" stroke="red" stroke-width="0.5"/>
    <text x="85" y="95" font-family="Arial" font-size="4" text-anchor="middle" fill="green">BTN A</text>
    <circle cx="115" cy="85" r="3.25" fill="none" stroke="red" stroke-width="0.5"/>
    <text x="115" y="95" font-family="Arial" font-size="4" text-anchor="middle" fill="green">BTN B</text>
<!--Digital Trim Cluster (Bottom Center)-->
    <circle cx="85" cy="130" r="3.25" fill="none" stroke="red" stroke-width="0.5"/>
    <circle cx="100" cy="130" r="3.25" fill="none" stroke="red" stroke-width="0.5"/>
    <circle cx="115" cy="130" r="3.25" fill="none" stroke="red" stroke-width="0.5"/>
    <text x="85" y="140" font-family="Arial" font-size="4" text-anchor="middle" fill="green">TRIM -</text>
    <text x="100" y="140" font-family="Arial" font-size="4" text-anchor="middle" fill="green">SET</text>
    <text x="115" y="140" font-family="Arial" font-size="4" text-anchor="middle" fill="green">TRIM +</text>
  </g>
</svg>
