name: Multi-Platform Build & Release

on:
  push:
    branches: [ "main" ]
    tags: [ '*RELEASE*' ] # Triggers release logic on tags like v1.0.0

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: windows-latest
            artifact_name: AVRRC-Ensign-Windows.zip
          - os: ubuntu-latest
            artifact_name: AVRRC-Ensign-Linux

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3' # A very stable Qt6 LTS version
        host: ${{ matrix.os == 'windows-latest' && 'windows' || 'linux' }}
        target: 'desktop'
        modules: 'qtserialport'

    - name: Linux Deps
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev

    - name: Build
      working-directory: manager/manager-cpp
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release

    - name: Windows Deployment (Zip)
      if: runner.os == 'Windows'
      working-directory: manager/manager-cpp
      shell: pwsh
      run: |
        cd build/Release
        windeployqt AVRRC_Ensign.exe --no-translations --compiler-runtime
        Compress-Archive -Path * -DestinationPath ../../AVRRC-Ensign-Windows.zip

    - name: Linux Deployment
      if: runner.os == 'Linux'
      run: cp manager/manager-cpp/build/AVRRC_Ensign AVRRC-Ensign-Linux

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: manager/manager-cpp/${{ matrix.artifact_name }}

  release:
    needs: build
    # Strict gate: only run if the tag contains 'RELEASE' 
    # AND it was pushed on the main branch
    if: contains(github.ref, 'RELEASE') && github.event.base_ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            AVRRC-Ensign-Windows.zip/AVRRC-Ensign-Windows.zip
            AVRRC-Ensign-Linux/AVRRC-Ensign-Linux
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
